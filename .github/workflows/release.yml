# SPDX-License-Identifier: Apache-2.0
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -U pip
      - run: python -m pip install -e ".[dev]"
      - name: Verify tag and release ancestry
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          package_version=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          test "${GITHUB_REF_NAME#v}" = "$package_version"
      - run: ruff format --check .
      - run: ruff check .
      - run: reuse lint
      - run: pytest tests/unit tests/state tests/architecture --cov=ray.klein
      - run: pytest tests/integration -m "integration and not external" --timeout=300
      - run: sphinx-build -W --keep-going -b html docs docs/_build/html
      - run: python scripts/audit_dependencies.py --local --skip-editable --progress-spinner off
      - run: >-
          licensecheck --requirements-paths pyproject.toml
          --license Apache-2.0 --extras all --zero

  build:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - run: python -m pip install -U pip build pip-audit twine
      - run: python -m pip install ".[all]"
      - run: python -m build
      - run: python -m twine check dist/*
      - name: Generate dependency SBOM
        run: >-
          python scripts/audit_dependencies.py --format cyclonedx-json
          --output dist/sbom.cdx.json --progress-spinner off
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: distributions
          path: dist/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/ray-klein/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: distributions
          path: dist/
      - run: rm dist/sbom.cdx.json
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
