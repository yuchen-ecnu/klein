# SPDX-License-Identifier: Apache-2.0
name: Reliability

on:
  workflow_dispatch:
    inputs:
      soak_seconds:
        description: Unbounded streaming soak duration in seconds
        required: true
        default: "7200"
  schedule:
    - cron: "17 2 * * 0"

permissions:
  contents: read

concurrency:
  group: reliability-${{ github.ref }}
  cancel-in-progress: false

jobs:
  two-hour-soak:
    name: Two-hour state and backpressure soak
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install "pip==26.1.2"
      - run: python -m pip install --constraint requirements/ci-constraints.txt -e ".[all,test]"
      - name: Exercise recovery integration before the soak
        run: make integration-state
      - name: Run unbounded streaming soak
        env:
          RAY_KLEIN_SOAK_SECONDS: ${{ inputs.soak_seconds || '7200' }}
          KLEIN_NO_RICH_UI: "1"
        run: python tests/run_klein_1min_job.py
