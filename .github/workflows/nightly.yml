# SPDX-License-Identifier: Apache-2.0
name: Nightly

on:
  workflow_dispatch:
  schedule:
    - cron: "43 3 * * *"

permissions:
  contents: read

jobs:
  runtime-soak:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -U pip
      - run: python -m pip install -e ".[all,test]"
      - run: pytest tests/integration -m "integration and not external" --timeout=300
      - name: One-minute unbounded runtime soak
        env:
          RAY_KLEIN_SOAK_SECONDS: "60"
          KLEIN_NO_RICH_UI: "1"
        run: python tests/run_klein_1min_job.py
