# SPDX-License-Identifier: Apache-2.0
name: DCO

on:
  pull_request:

permissions:
  contents: read

jobs:
  signoff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false
      - run: python scripts/check_dco.py "origin/${GITHUB_BASE_REF}"
