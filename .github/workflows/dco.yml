# SPDX-License-Identifier: Apache-2.0
name: DCO

on:
  pull_request:

permissions:
  contents: read

jobs:
  signoff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
      - run: python scripts/check_dco.py "origin/${GITHUB_BASE_REF}"
