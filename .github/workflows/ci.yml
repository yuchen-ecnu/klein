# SPDX-License-Identifier: Apache-2.0
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -U pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff format --check .
      - run: ruff check .
      - run: reuse lint

  test:
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install -U pip
      - run: python -m pip install -e ".[all,test]"
      - name: Unit, state, and architecture tests
        run: >-
          pytest tests/unit tests/state tests/architecture -m "not slow"
          --cov=ray.klein --cov-report=xml
          --junitxml=test-results/unit-${{ matrix.python-version }}.xml
      - uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24
        if: matrix.python-version == '3.12'
        with:
          use_oidc: true
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: unit-test-results-${{ matrix.python-version }}
          path: test-results/
          if-no-files-found: error

  integration:
    strategy:
      fail-fast: false
      matrix:
        ray-version: ["2.50.1", "2.51.2"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -U pip
      - run: python -m pip install -e ".[all,test]"
      - run: python -m pip install "ray[data,serve]==${{ matrix.ray-version }}"
      - name: Ray integration tests
        run: >-
          pytest tests/integration -m "integration and not external"
          --timeout=300 --junitxml=test-results/integration.xml
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: integration-test-results-${{ matrix.ray-version }}
          path: test-results/
          if-no-files-found: error

  external:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -U pip
      - run: python -m pip install -e ".[all,test]"
      - name: External connector tests
        run: >-
          pytest tests/integration/external -m external --run-external
          --timeout=300 --junitxml=test-results/external.xml
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: external-test-results
          path: test-results/
          if-no-files-found: error

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -U pip
      - run: python -m pip install -e ".[docs]"
      - run: sphinx-build -W --keep-going -b html docs docs/_build/html

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -U pip
      - run: python -m pip install -e ".[all,test]"
      - run: python scripts/audit_dependencies.py --local --skip-editable --progress-spinner off
      - run: >-
          licensecheck --requirements-paths pyproject.toml
          --license Apache-2.0 --extras all --zero

  package:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -U pip build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - name: Verify wheel in a clean environment
        run: |
          python -m venv /tmp/ray-klein-wheel-test
          /tmp/ray-klein-wheel-test/bin/pip install dist/*.whl
          /tmp/ray-klein-wheel-test/bin/python -c "import ray, ray.klein; assert callable(ray.klein.from_items)"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: runner.os == 'Linux'
        with:
          name: distributions
          path: dist/
          if-no-files-found: error
