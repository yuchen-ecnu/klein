# SPDX-License-Identifier: Apache-2.0
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Component dependency graph:
# quality -> unit-core -> {unit-runtime, unit-state}
# unit-runtime + unit-state -> unit-sql
# unit-runtime -> unit-connectors
# quality -> dependency-compat (minimum and latest supported dependencies)
# unit-* -> coverage
# unit-runtime -> integration-runtime -> {integration-state, integration-connectors}
# integration-state + unit-sql -> integration-sql
# integration-connectors -> external-connectors
# every required leaf -> ci-success
jobs:
  quality:
    name: Quality / lint and repository policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install "pip==26.1.2"
      - run: python -m pip install --constraint requirements/ci-constraints.txt -e ".[dev]"
      - run: ruff format --check .
      - run: ruff check .
      - run: mypy
      - run: reuse lint

  unit-core:
    name: Unit / core API, config, graph, architecture
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install "pip==26.1.2"
      - run: python -m pip install --constraint requirements/ci-constraints.txt -e ".[all,test]"
      - name: Core component tests
        run: >-
          pytest tests/unit tests/state tests/architecture
          -m "component_core and not slow"
          --junitxml=test-results/unit-core.xml
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: unit-core-results
          path: test-results/
          if-no-files-found: error

  unit-runtime:
    name: Unit / runtime, scheduler, data plane, failover
    needs: unit-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install "pip==26.1.2"
      - run: python -m pip install --constraint requirements/ci-constraints.txt -e ".[all,test]"
      - name: Runtime component tests
        run: >-
          pytest tests/unit tests/state tests/architecture
          -m "component_runtime and not slow"
          --junitxml=test-results/unit-runtime.xml
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: unit-runtime-results
          path: test-results/
          if-no-files-found: error

  unit-state:
    name: Unit / state, checkpoint, event time
    needs: unit-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install "pip==26.1.2"
      - run: python -m pip install --constraint requirements/ci-constraints.txt -e ".[all,test]"
      - name: State component tests
        run: >-
          pytest tests/unit tests/state tests/architecture
          -m "component_state and not slow"
          --junitxml=test-results/unit-state.xml
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: unit-state-results
          path: test-results/
          if-no-files-found: error

  unit-sql:
    name: Unit / batch and streaming SQL
    needs: [unit-core, unit-runtime, unit-state]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install "pip==26.1.2"
      - run: python -m pip install --constraint requirements/ci-constraints.txt -e ".[all,test]"
      - name: SQL component tests
        run: >-
          pytest tests/unit tests/state tests/architecture
          -m "component_sql and not slow"
          --junitxml=test-results/unit-sql.xml
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: unit-sql-results
          path: test-results/
          if-no-files-found: error

  unit-connectors:
    name: Unit / connectors and format contracts
    needs: [unit-core, unit-runtime]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install "pip==26.1.2"
      - run: python -m pip install --constraint requirements/ci-constraints.txt -e ".[all,test]"
      - name: Connector component tests
        run: >-
          pytest tests/unit tests/state tests/architecture
          -m "component_connectors and not slow"
          --junitxml=test-results/unit-connectors.xml
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: unit-connectors-results
          path: test-results/
          if-no-files-found: error

  python-compat:
    name: Python ${{ matrix.python-version }} compatibility
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install "pip==26.1.2"
      - run: python -m pip install --constraint requirements/ci-constraints.txt -e ".[all,test]"
      - name: All unit components
        run: >-
          pytest tests/unit tests/state tests/architecture -m "not slow"
          --junitxml=test-results/python-${{ matrix.python-version }}.xml
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: python-${{ matrix.python-version }}-results
          path: test-results/
          if-no-files-found: error

  dependency-compat:
    name: Dependencies / ${{ matrix.name }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: minimum on Python 3.10
            python-version: "3.10"
            constraint: minimum
          - name: minimum on Python 3.12
            python-version: "3.12"
            constraint: minimum
          - name: latest supported set
            python-version: "3.12"
            constraint: latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install "pip==26.1.2"
      - name: Install the minimum supported dependency set
        if: matrix.constraint == 'minimum'
        run: python -m pip install --constraint requirements/minimum-constraints.txt -e ".[all,test]"
      - name: Install the latest dependency set within supported bounds
        if: matrix.constraint == 'latest'
        run: python -m pip install --upgrade -e ".[all,test]"
      - name: Exercise stable dependency boundaries
        run: >-
          pytest -q
          tests/unit/test_configuration.py
          tests/unit/test_configuration_properties.py
          tests/unit/test_compatibility_policy.py
          tests/unit/test_dashboard_server.py
          tests/unit/test_state_codec_properties.py
          tests/unit/integrations/test_kafka_contract.py
          tests/unit/integrations/test_rocketmq_contract.py

  coverage:
    name: Coverage / all unit components
    needs: [unit-core, unit-runtime, unit-state, unit-sql, unit-connectors]
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install "pip==26.1.2"
      - run: python -m pip install --constraint requirements/ci-constraints.txt -e ".[all,test]"
      - run: >-
          pytest tests/unit tests/state tests/architecture -m "not slow"
          --cov=ray.klein --cov-report=xml --cov-report=json:coverage.json
          --junitxml=test-results/coverage.xml
      - run: python scripts/check_coverage_policy.py coverage.json
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
        with:
          use_oidc: true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: coverage-results
          path: |
            coverage.xml
            coverage.json
            test-results/
          if-no-files-found: error

  integration-runtime:
    name: Integration / real Ray runtime
    needs: [unit-runtime, python-compat]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install "pip==26.1.2"
      - run: python -m pip install --constraint requirements/ci-constraints.txt -e ".[all,test]"
      - run: python -m pip install "ray[data,serve]==2.56.1"
      - run: >-
          pytest tests/integration
          -m "integration and component_runtime and not external"
          --timeout=300 --junitxml=test-results/integration-runtime.xml
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: integration-runtime-results
          path: test-results/
          if-no-files-found: error

  integration-state:
    name: Integration / real Ray state and recovery
    needs: [unit-state, integration-runtime]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install "pip==26.1.2"
      - run: python -m pip install --constraint requirements/ci-constraints.txt -e ".[all,test]"
      - run: python -m pip install "ray[data,serve]==2.56.1"
      - run: >-
          pytest tests/integration
          -m "integration and component_state and not external"
          --timeout=300 --junitxml=test-results/integration-state.xml
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: integration-state-results
          path: test-results/
          if-no-files-found: error

  integration-sql:
    name: Integration / real Ray SQL and state restore
    needs: [unit-sql, integration-state]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install "pip==26.1.2"
      - run: python -m pip install --constraint requirements/ci-constraints.txt -e ".[all,test]"
      - run: python -m pip install "ray[data,serve]==2.56.1"
      - run: >-
          pytest tests/integration
          -m "integration and component_sql and not external"
          --timeout=300 --junitxml=test-results/integration-sql.xml
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: integration-sql-results
          path: test-results/
          if-no-files-found: error

  integration-connectors:
    name: Integration / local connectors
    needs: [unit-connectors, integration-runtime]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install "pip==26.1.2"
      - run: python -m pip install --constraint requirements/ci-constraints.txt -e ".[all,test]"
      - run: python -m pip install "ray[data,serve]==2.56.1"
      - run: >-
          pytest tests/integration
          -m "integration and component_connectors and not external"
          --timeout=300 --junitxml=test-results/integration-connectors.xml
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: integration-connectors-results
          path: test-results/
          if-no-files-found: error

  external-connectors:
    name: External / Kafka and Redis services
    needs: integration-connectors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install "pip==26.1.2"
      - run: python -m pip install --constraint requirements/ci-constraints.txt -e ".[all,test]"
      - run: >-
          pytest tests/integration/external
          -m "external and component_connectors" --run-external
          --timeout=300 --junitxml=test-results/external-connectors.xml
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: external-connectors-results
          path: test-results/
          if-no-files-found: error

  docs:
    name: Documentation / strict build
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install "pip==26.1.2"
      - run: python -m pip install --constraint requirements/ci-constraints.txt -e ".[all,docs]"
      - run: make docs

  security:
    name: Security / dependencies and licenses
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install "pip==26.1.2"
      - run: python -m pip install --constraint requirements/ci-constraints.txt -e ".[all,test]"
      - run: pip-audit --local --skip-editable --progress-spinner off
      - run: python scripts/check_dependency_licenses.py

  package:
    name: Package / ${{ matrix.os }} wheel
    needs: [quality, python-compat]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install "pip==26.1.2"
      - run: python -m pip install --constraint requirements/ci-constraints.txt "build==1.5.0" "twine==6.2.0"
      - run: python -m build
      - run: python -m twine check dist/*
      - run: python scripts/check_distribution.py dist/*
      - name: Verify wheel in a clean environment
        run: |
          python -m venv /tmp/ray-klein-wheel-test
          /tmp/ray-klein-wheel-test/bin/python -m pip install "pip==26.1.2"
          /tmp/ray-klein-wheel-test/bin/pip install --constraint requirements/ci-constraints.txt dist/*.whl
          /tmp/ray-klein-wheel-test/bin/python -c "import ray, ray.klein; assert callable(ray.klein.from_items)"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: runner.os == 'Linux'
        with:
          name: distributions
          path: dist/
          if-no-files-found: error

  ci-success:
    name: CI / required gate
    if: always()
    needs:
      - quality
      - unit-core
      - unit-runtime
      - unit-state
      - unit-sql
      - unit-connectors
      - python-compat
      - dependency-compat
      - coverage
      - integration-runtime
      - integration-state
      - integration-sql
      - integration-connectors
      - external-connectors
      - docs
      - security
      - package
    runs-on: ubuntu-latest
    steps:
      - name: Require every CI module to succeed
        run: |
          test "${{ contains(needs.*.result, 'failure') }}" = "false"
          test "${{ contains(needs.*.result, 'cancelled') }}" = "false"
          test "${{ contains(needs.*.result, 'skipped') }}" = "false"
