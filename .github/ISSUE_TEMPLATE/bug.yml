# SPDX-License-Identifier: Apache-2.0
name: Bug report
description: Report a reproducible defect
title: "[bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not report security vulnerabilities here; follow SECURITY.md.
  - type: input
    id: versions
    attributes:
      label: Versions
      description: Klein, Ray, Python, and operating-system versions
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and logs
    validations:
      required: true
